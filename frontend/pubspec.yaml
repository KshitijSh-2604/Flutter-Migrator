name: flutter_migrator
description: AI-powered Flutter code migration assistant.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  # Networking
  http: ^1.2.2

  # State management
  provider: ^6.1.2

  # File picking (web + desktop + mobile)
  file_picker: ^8.1.2

  # Code syntax highlight
  flutter_highlight: ^0.7.0

  # UI helpers
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  gap: ^3.0.1

  # Utils
  intl: ^0.19.0
  shared_preferences: ^2.3.2

  # NEW — add after google_fonts:
  diff_match_patch: ^0.4.1      # Computes line-by-line diffs for the diff viewer
  archive: ^3.6.1               # Needed for ZIP download of migrated project
  url_launcher: ^6.3.1          # Open pub.dev links, GitHub links

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/